<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>煎六颗蛋</title>
<link rel="stylesheet" href="egg.css?v=13">
</head>
<body>
<a class="langlink pill" href="en.html">EN</a>
<canvas id="stage"></canvas>

<div class="hud">
  <h1><span class="titlewrap"><span id="titleText"></span><span class="byline" id="byline"></span></span></h1>
  <div class="progress pill" id="progress"></div>
</div>

<div class="bottombar">
  <div class="status pill" id="status">…</div>
  <div class="toolbar">
    <button class="tool active" data-tool="pet">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19C7.5 16 5 12.8 5 10.1 5 8.2 6.5 7 8.2 7c1.5 0 2.9.9 3.8 2.3C12.9 7.9 14.3 7 15.8 7 17.5 7 19 8.2 19 10.1c0 2.7-2.5 5.9-7 8.9Z"/></svg>
      <span class="lbl"></span>
    </button>
    <button class="tool" data-tool="fry">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10.5" cy="15" r="4.6"/><path d="M15 14 21 12.4"/><path d="M8 6c-.8.8.8 1.6 0 2.4"/><path d="M12 5.4c-.8.8.8 1.6 0 2.4"/></svg>
      <span class="lbl"></span>
    </button>
    <button class="tool" data-tool="salt">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.6 12h6.8v6.6a1.5 1.5 0 0 1-1.5 1.5h-3.8a1.5 1.5 0 0 1-1.5-1.5z"/><path d="M9.1 12a2.9 2.9 0 0 1 5.8 0"/><circle cx="11" cy="8.4" r=".5" fill="currentColor" stroke="none"/><circle cx="12" cy="7.9" r=".5" fill="currentColor" stroke="none"/><circle cx="13" cy="8.4" r=".5" fill="currentColor" stroke="none"/></svg>
      <span class="lbl"></span>
    </button>
    <button class="tool" data-tool="pepper">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.9 12.5h4.2v6.1a1.4 1.4 0 0 1-1.4 1.4h-1.4a1.4 1.4 0 0 1-1.4-1.4z"/><path d="M10.4 12.5V9a1.6 1.6 0 0 1 3.2 0v3.5"/><circle cx="12" cy="6.6" r="1.1"/></svg>
      <span class="lbl"></span>
    </button>
    <button class="tool" data-tool="poke">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="2.6" fill="currentColor" stroke="none"/><path d="M7.4 8.6a7 7 0 0 0 0 8.8"/><path d="M16.6 8.6a7 7 0 0 1 0 8.8"/></svg>
      <span class="lbl"></span>
    </button>
  </div>
</div>

<div class="overlay hidden" id="photoOverlay">
  <div class="photoCard">
    <h2><span id="photoTitle"></span></h2>
    <p id="photoSub"></p>
    <img id="photoImg" alt="">
    <p class="shareHint" id="shareHint"></p>
    <p class="credit" id="creditLine"></p>
    <div class="photoActions">
      <button class="tool active" id="restartBtn" type="button">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12a7 7 0 1 1-2-4.9"/><path d="M17.4 4.2 17 7.6l-3.4-.5"/></svg>
        <span class="lbl"></span>
      </button>
    </div>
  </div>
</div>

<script src="egg.js?v=13"></script>
</body>
</html>
